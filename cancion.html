<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Redirigiendo... · Ale Guitarra</title>
<script>
// Compatibilidad con links viejos: ?slug=X redirige a /cancion/X
(function(){
  var p = new URLSearchParams(window.location.search).get('slug');
  if (p) {
    window.location.replace('/cancion/' + encodeURIComponent(p));
  } else {
    window.location.replace('/');
  }
})();
</script>
<meta http-equiv="refresh" content="0; url=/">
</head>
<body>Redirigiendo…</body>
</html>
