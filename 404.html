<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ale Guitarra</title>
<meta name="theme-color" content="#0F0805">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/icon.png" type="image/png">

<meta property="og:title" content="Ale Guitarra · Cancionero cristiano">
<meta property="og:description" content="Disponible en la app gratuita Ale Guitarra.">
<meta property="og:image" content="https://aleguitarra.github.io/logo.png">
<meta property="og:type" content="website">

<style>
:root {
  --primary:#B8651D;--primary-light:#D4843E;--gold:#D4A574;
  --cream:#F5E6D3;--bg:#0F0805;--bg-2:#1A0F08;--card:#241710;
  --text:#F5E6D3;--muted:#9C8775;--border:rgba(212,132,62,0.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;line-height:1.5}
body::before{content:'';position:fixed;inset:-30%;background:radial-gradient(circle at 30% 30%,rgba(184,101,29,0.15) 0%,transparent 45%),radial-gradient(circle at 70% 70%,rgba(139,69,19,0.10) 0%,transparent 45%);pointer-events:none;z-index:-1}

nav{padding:18px 24px;display:flex;align-items:center;border-bottom:1px solid var(--border);background:rgba(15,8,5,0.6);backdrop-filter:blur(16px)}
nav a{color:var(--cream);text-decoration:none;display:flex;align-items:center;gap:12px}
nav img{width:36px;height:36px;border-radius:8px;display:block}
nav h2{color:var(--cream);font-size:18px;font-weight:700;font-family:Georgia,serif;line-height:1}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{max-width:480px;width:100%;background:linear-gradient(155deg,var(--card) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:24px;padding:clamp(36px,5vw,52px) clamp(24px,4vw,40px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center}

.app-icon{width:104px;height:104px;border-radius:24px;margin-bottom:28px;box-shadow:0 14px 36px rgba(184,101,29,0.4);display:block}

.code-pill{background:rgba(184,101,29,0.18);color:var(--primary-light);padding:8px 22px;border-radius:100px;font-size:15px;font-weight:700;letter-spacing:3px;margin-bottom:22px;display:inline-block;line-height:1.2;font-family:'SF Mono',Menlo,monospace}

h1{font-family:Georgia,serif;font-size:clamp(22px,4.4vw,30px);color:var(--cream);margin-bottom:18px;line-height:1.2;letter-spacing:-0.01em;font-weight:700;max-width:100%;word-wrap:break-word}

.subtitle{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:32px;max-width:380px}
.subtitle strong{color:var(--gold);font-weight:600}

.cta{display:inline-flex;align-items:center;gap:14px;background:var(--cream);color:var(--bg);padding:14px 26px;border-radius:14px;text-decoration:none;font-weight:700;font-size:16px;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 8px 24px rgba(245,230,211,0.18);margin-bottom:18px}
.cta:hover{transform:translateY(-2px)}
.cta svg{width:28px;height:28px;flex-shrink:0}
.cta-text{display:flex;flex-direction:column;align-items:flex-start}
.cta-small{font-size:11px;opacity:0.72;line-height:1}
.cta-big{font-size:16px;font-weight:700;line-height:1.2;margin-top:2px}

.foot{color:var(--muted);font-size:13px;line-height:1.4}
.foot a{color:var(--primary-light);text-decoration:none}
.loading{text-align:center;padding:60px;color:var(--muted)}

@media(max-width:480px){
  .app-icon{width:88px;height:88px;border-radius:20px;margin-bottom:24px}
  .card{padding:32px 24px}
  h1{font-size:22px}
}
</style>
</head>
<body>

<nav>
  <a href="/">
    <img src="/icon.png" alt="">
    <h2>Ale Guitarra</h2>
  </a>
</nav>

<div class="main" id="main">
  <div class="loading">Cargando…</div>
</div>

<script>
(function() {
  var path = window.location.pathname.split('/').filter(Boolean);
  var main = document.getElementById('main');

  // Caso 1: /cancion/SLUG → redirect a /cancion/SLUG.html
  if (path[0] === 'cancion' && path[1] && !path[1].endsWith('.html')) {
    window.location.replace('/cancion/' + path[1] + '.html');
    return;
  }

  // Caso 2: /lista/CODE → mostrar card de lista
  if (path[0] === 'lista' && path[1]) {
    var code = path[1].toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 5);
    if (!code) { showHome(); return; }
    document.title = 'Lista ' + code + ' · Ale Guitarra';
    main.innerHTML =
      '<div class="card">' +
      '<img src="/icon.png" alt="" class="app-icon">' +
      '<span class="code-pill">' + code + '</span>' +
      '<h1>Te compartieron una lista</h1>' +
      '<p class="subtitle">Esta lista está disponible en <strong>Ale Guitarra</strong>. Descargá la app y abrila desde el link de WhatsApp — se importa sola.</p>' +
      '<a href="https://play.google.com/store/apps/details?id=com.corapps.aleguitarra" class="cta">' +
        '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">' +
          '<path d="M22.018 13.298l-3.919 2.218-3.515-3.493 3.543-3.521 3.891 2.202a1.49 1.49 0 0 1 0 2.594zM1.337.924a1.486 1.486 0 0 0-.112.568v21.017c0 .217.045.419.124.6l11.155-11.087L1.337.924zm12.207 10.065l3.258-3.238L3.45.195a1.466 1.466 0 0 0-.946-.196L13.544 10.99zm0 2.018L3.45 23.806c.298.046.612-.001.946-.196l13.352-7.556-3.704-3.681z"/>' +
        '</svg>' +
        '<div class="cta-text">' +
          '<span class="cta-small">Descargar en</span>' +
          '<span class="cta-big">Google Play</span>' +
        '</div>' +
      '</a>' +
      '<p class="foot"><a href="/">¿Ya tenés la app? Volvé al inicio</a></p>' +
      '</div>';
    return;
  }

  // Cualquier otra ruta: home
  showHome();

  function showHome() {
    main.innerHTML =
      '<div class="card">' +
      '<img src="/icon.png" alt="" class="app-icon">' +
      '<h1>Página no encontrada</h1>' +
      '<p class="subtitle">El enlace puede haber cambiado o ser inválido.</p>' +
      '<a href="/" class="cta" style="background:var(--primary);color:var(--cream)">' +
        '<div class="cta-text"><span class="cta-big">Ir al inicio</span></div>' +
      '</a>' +
      '</div>';
  }
})();
</script>

</body>
</html>
