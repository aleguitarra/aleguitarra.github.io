*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

.card{max-width:520px;width:100%;background:linear-gradient(155deg,var(--card) 0%,var(--bg-2) 100%);border:1px solid var(--border);border-radius:24px;padding:clamp(32px,5vw,48px);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}

.cat-pill{display:inline-block;background:rgba(184,101,29,0.18);color:var(--primary-light);padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:20px}
h1{font-family:Georgia,serif;font-size:clamp(24px,4.5vw,32px);color:var(--cream);margin-bottom:14px;line-height:1.2;letter-spacing:-0.01em;font-weight:700}
.subtitle{color:var(--muted);font-size:15px;line-height:1.55;margin-bottom:32px}
.subtitle strong{color:var(--gold);font-weight:600}
.cta{display:inline-flex;align-items:center;gap:14px;background:var(--cream);color:var(--bg);padding:14px 28px;border-radius:14px;text-decoration:none;font-weight:700;font-size:16px;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 8px 24px rgba(245,230,211,0.18)}
.cta:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(245,230,211,0.28)}
.cta:active{transform:translateY(0)}
.cta svg{width:28px;height:28px}
.cta-text{display:flex;flex-direction:column;align-items:flex-start}
.cta-small{font-size:11px;opacity:0.72;line-height:1}
.cta-big{font-size:16px;font-weight:700;line-height:1.2;margin-top:2px}
.foot{margin-top:24px;color:var(--muted);font-size:13px}
.foot a{color:var(--primary-light);text-decoration:none}
.foot a:hover{text-decoration:underline}
@media(max-width:480px){.app-icon{width:80px;height:80px}}
