<style>
:root {
  --primary:#B8651D;--primary-light:#D4843E;--cream:#F5E6D3;
  --bg:#0F0805;--card:#241710;--text:#F5E6D3;--muted:#9C8775;
  --border:rgba(212,132,62,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{background:rgba(15,8,5,0.92);backdrop-filter:blur(20px);padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.topbar a{color:var(--cream);text-decoration:none;display:flex;align-items:center;gap:12px;flex:1}
.topbar img{width:36px;height:36px;border-radius:8px}
.topbar h2{color:var(--primary-light);font-size:18px;font-weight:700;font-family:'Playfair Display',Georgia,serif}
.container{max-width:720px;margin:0 auto;padding:24px 20px 120px}
h1.title{color:var(--primary-light);font-family:Georgia,serif;font-size:clamp(24px,5vw,32px);margin-bottom:6px;text-align:center;line-height:1.15;letter-spacing:-0.01em}
.cat-pill{display:inline-block;background:rgba(184,101,29,0.18);color:var(--primary-light);padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;margin:0 auto 24px;text-align:center}
.cat-wrap{text-align:center;margin-bottom:8px}
.song-content{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;font-family:Arial,sans-serif;font-size:14.175px;line-height:1.4;white-space:pre-wrap;overflow-x:auto;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.song-content b,.song-content strong{color:var(--primary-light);font-weight:700}
.loading,.error{text-align:center;padding:60px 20px;color:var(--muted)}
.error a{color:var(--primary-light);display:inline-block;margin-top:14px;text-decoration:none}
.install-banner{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);color:var(--cream);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -8px 24px rgba(0,0,0,0.5);z-index:100}
.install-banner-text{font-weight:600;font-size:14px}
.install-banner a{background:var(--cream);color:#0F0805;padding:9px 18px;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;white-space:nowrap;transition:transform 0.15s}
.install-banner a:active{transform:scale(0.96)}
.youtube-section{margin-top:28px}
.youtube-section h3{color:var(--primary-light);font-size:15px;margin-bottom:12px;font-weight:600}
.youtube-section iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:12px;margin-bottom:10px;background:#000}
@media(max-width:600px){.container{padding:18px 14px 110px}.song-content{padding:18px 16px;font-size:13.5px}}
</style>
</head>
<body>

<div class="topbar">
  <a href="/">
    <img src="/icon.png" alt="">
    <h2>Ale Guitarra</h2>
  </a>
</div>

<div class="container">
  <div class="cat-wrap"><span class="cat-pill">Alabanza</span></div>
  <h1 class="title">Hay momentos que no deberían terminar</h1>
  <div id="content" class="loading">Cargando…</div>
  <div class="youtube-section"><h3>🎬 Videos</h3><iframe src="https://www.youtube.com/embed/xDCdaIorebU" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>
</div>

<div class="install-banner">
  <span class="install-banner-text">📱 Mejor experiencia en la app</span>
  <a href="https://play.google.com/store/apps/details?id=com.corapps.aleguitarra">Descargar</a>
</div>

<script>
fetch('https://raw.githubusercontent.com/tomicor/aleguitarra-data/main/songs/hay-momentos-que-no-deberian-terminar.html')
  .then(r => r.ok ? r.text() : Promise.reject())
  .then(html => {
    const c = document.getElementById('content');
    c.className = 'song-content';
    c.innerHTML = html;
  })
  .catch(() => {
    const c = document.getElementById('content');
    c.className = 'error';
    c.innerHTML = 'No se pudo cargar la canción.<br><a href="/">Ir al inicio</a>';
  });
</script>

</body>
